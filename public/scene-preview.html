<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Nova-7 — Szenen Beispiel</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#020812; font-family:monospace; padding:30px; display:flex; flex-direction:column; gap:24px; align-items:center; }
  h1 { color:#06b6d4; letter-spacing:4px; font-size:14px; margin-bottom:8px; }
  .card { width:700px; border-radius:14px; overflow:hidden; border:1px solid rgba(239,68,68,0.25); }
  .card2 { width:700px; border-radius:14px; overflow:hidden; border:1px solid rgba(245,158,11,0.25); }
  .card3 { width:700px; border-radius:14px; overflow:hidden; border:1px solid rgba(16,185,129,0.25); }

</head>
<body>
<h1>NOVA-7 — SZENEN-BEISPIELE (DETAILLIERT)</h1>

<!-- LEVEL 1: Medizinstation -->
<div class="card">
<svg viewBox="0 0 700 200" width="700" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ambientRed" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3b0a0a"/>
      <stop offset="60%" stop-color="#150505"/>
      <stop offset="100%" stop-color="#080202"/>
    </radialGradient>
    <radialGradient id="lamp1" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ff6060" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Floor tile pattern -->
    <pattern id="floorTiles" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#0c0808"/>
      <rect width="39" height="39" fill="none" stroke="#1a0f0f" stroke-width="0.5"/>
      <line x1="20" y1="0" x2="20" y2="40" stroke="#160a0a" stroke-width="0.3"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="#160a0a" stroke-width="0.3"/>
    </pattern>
    <!-- Wall panel pattern -->
    <pattern id="wallPanel" width="80" height="60" patternUnits="userSpaceOnUse">
      <rect width="80" height="60" fill="#1a0808"/>
      <rect x="4" y="4" width="72" height="52" fill="none" stroke="#2a0f0f" stroke-width="0.5"/>
      <line x1="0" y1="30" x2="80" y2="30" stroke="#1e0d0d" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="700" height="200" fill="url(#ambientRed)"/>

  <!-- Ceiling -->
  <rect x="0" y="0" width="700" height="35" fill="#0d0404"/>
  <!-- Ceiling panels -->
  <rect x="0" y="0" width="700" height="35" fill="url(#wallPanel)" opacity="0.4"/>

  <!-- Emergency light bars on ceiling -->
  <rect x="80" y="8" width="120" height="6" rx="3" fill="#1a0808" stroke="#3a1010" stroke-width="0.5"/>
  <rect x="83" y="10" width="114" height="2" fill="#ff4444" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="500" y="8" width="120" height="6" rx="3" fill="#1a0808" stroke="#3a1010" stroke-width="0.5"/>
  <rect x="503" y="10" width="114" height="2" fill="#ff4444" opacity="0.6">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Main ceiling light (operating theater style) -->
  <ellipse cx="350" cy="20" rx="60" ry="12" fill="#2a0808" stroke="#4a1515" stroke-width="0.8"/>
  <ellipse cx="350" cy="20" rx="45" ry="8" fill="#3a0808"/>
  <circle cx="350" cy="22" r="15" fill="#ffffff" opacity="0.04">
    <animate attributeName="opacity" values="0.04;0.08;0.04" dur="3s" repeatCount="indefinite"/>
  </circle>
  <rect x="290" y="10" width="120" height="200" fill="url(#lamp1)" opacity="0.6"/>

  <!-- Back wall -->
  <rect x="0" y="35" width="700" height="100" fill="url(#wallPanel)"/>
  <rect x="0" y="35" width="700" height="100" fill="#110505" opacity="0.7"/>

  <!-- Perspective floor lines -->
  <rect x="0" y="135" width="700" height="65" fill="url(#floorTiles)"/>
  <!-- Floor perspective lines -->
  <line x1="350" y1="135" x2="0" y2="200" stroke="#220e0e" stroke-width="0.5"/>
  <line x1="350" y1="135" x2="175" y2="200" stroke="#1e0c0c" stroke-width="0.4"/>
  <line x1="350" y1="135" x2="525" y2="200" stroke="#1e0c0c" stroke-width="0.4"/>
  <line x1="350" y1="135" x2="700" y2="200" stroke="#220e0e" stroke-width="0.5"/>

  <!-- Wall-floor junction -->
  <rect x="0" y="133" width="700" height="4" fill="#1a0808"/>
  <!-- Baseboard with warning stripes -->
  <rect x="0" y="130" width="700" height="5" fill="#0d0404"/>

  <!-- Left wall panel with medical equipment rack -->
  <rect x="20" y="40" width="90" height="90" rx="2" fill="#0f0505" stroke="#2a0f0f" stroke-width="0.8"/>
  <!-- Equipment buttons/indicators -->
  <rect x="28" y="50" width="74" height="12" rx="1" fill="#180808" stroke="#2a1010" stroke-width="0.4"/>
  <text x="65" y="59" text-anchor="middle" fill="#ef4444" font-size="5.5" font-family="monospace" opacity="0.7">VITA-MONITOR</text>
  <!-- EKG line on screen -->
  <rect x="28" y="65" width="74" height="25" rx="1" fill="#0a0303"/>
  <polyline points="30,78 40,78 45,68 50,88 55,73 60,73 65,78 70,68 75,73 80,73 85,78 90,68 95,78 100,78" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <!-- Stat rows -->
  <text x="32" y="100" fill="#ef4444" font-size="5" font-family="monospace" opacity="0.6">HR: 0</text>
  <text x="32" y="107" fill="#ef4444" font-size="5" font-family="monospace" opacity="0.6">SpO2: --</text>
  <text x="32" y="114" fill="#ef4444" font-size="5" font-family="monospace" opacity="0.6">RAD: 12.4 mSv</text>
  <!-- Alarm light on panel -->
  <circle cx="92" cy="44" r="5" fill="#ef4444" opacity="0.9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.9;0.1;0.9" dur="0.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Medical bed (perspective) -->
  <!-- Bed frame -->
  <rect x="220" y="100" width="260" height="38" rx="4" fill="#1a0808" stroke="#2e1010" stroke-width="0.8"/>
  <!-- Mattress -->
  <rect x="222" y="95" width="256" height="15" rx="3" fill="#200c0c" stroke="#3a1515" stroke-width="0.5"/>
  <!-- Pillow -->
  <rect x="430" y="90" width="40" height="18" rx="5" fill="#180808" stroke="#2a1010" stroke-width="0.5"/>
  <!-- Patient outline (lying) -->
  <rect x="240" y="88" width="175" height="14" rx="7" fill="#1a0606" opacity="0.7"/>
  <circle cx="248" cy="88" r="10" fill="#150505" stroke="#250a0a" stroke-width="0.5"/>
  <!-- Bed legs perspective -->
  <rect x="230" y="138" width="8" height="22" rx="2" fill="#150505"/>
  <rect x="460" y="138" width="8" height="22" rx="2" fill="#150505"/>

  <!-- IV Stand -->
  <line x1="220" y1="138" x2="220" y2="50" stroke="#2a1010" stroke-width="2"/>
  <line x1="205" y1="50" x2="235" y2="50" stroke="#2a1010" stroke-width="2"/>
  <!-- IV bag -->
  <rect x="208" y="45" width="25" height="35" rx="8" fill="#0f0505" stroke="#3a1515" stroke-width="0.8" opacity="0.8"/>
  <line x1="220" y1="80" x2="220" y2="100" stroke="#331515" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- IV tube glow -->
  <line x1="220" y1="80" x2="220" y2="100" stroke="#ef4444" stroke-width="0.5" opacity="0.3"/>

  <!-- Radiation dosimeter display on wall (right) -->
  <rect x="580" y="40" width="100" height="85" rx="4" fill="#0f0505" stroke="#2a1010" stroke-width="0.8"/>
  <rect x="585" y="45" width="90" height="55" rx="2" fill="#080202"/>
  <!-- Gauge arc -->
  <path d="M 600 90 A 30 30 0 0 1 660 90" fill="none" stroke="#2a1010" stroke-width="3"/>
  <path d="M 600 90 A 30 30 0 0 1 645 64" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.8"/>
  <text x="630" y="98" text-anchor="middle" fill="#ef4444" font-size="6" font-family="monospace">12.4 mSv</text>
  <text x="630" y="52" text-anchor="middle" fill="#64748b" font-size="5.5" font-family="monospace">DOSIMETER</text>
  <!-- Status LEDs -->
  <circle cx="592" cy="115" r="4" fill="#ef4444" opacity="0.9" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="610" cy="115" r="4" fill="#1e3a5f" opacity="0.4"/>
  <circle cx="628" cy="115" r="4" fill="#1e3a5f" opacity="0.4"/>
  <text x="592" y="125" text-anchor="middle" fill="#64748b" font-size="5" font-family="monospace">ALARM</text>

  <!-- Medical cross symbol on wall -->
  <rect x="490" y="50" width="36" height="10" rx="2" fill="#ef4444" opacity="0.6" filter="url(#softglow)"/>
  <rect x="503" y="37" width="10" height="36" rx="2" fill="#ef4444" opacity="0.6" filter="url(#softglow)"/>

  <!-- Ambient glow from ceiling light on bed -->
  <ellipse cx="350" cy="140" rx="120" ry="20" fill="#ff0000" opacity="0.04"/>

  <!-- ARIA log bar -->
  <rect x="0" y="174" width="700" height="26" fill="rgba(0,0,0,0.75)"/>
  <rect x="0" y="174" width="700" height="1" fill="rgba(239,68,68,0.3)"/>
  <text x="12" y="185" fill="#ef4444" font-size="7" font-family="monospace" opacity="0.8">▶ ARIA-LOG:</text>
  <text x="12" y="196" fill="#94a3b8" font-size="6.5" font-family="monospace">ARIA: Strahlenopfer in Abteil Alpha-3. Sofortmaßnahmen erforderlich. Dosimeter kritisch.</text>

  <!-- Room label -->
  <rect x="520" y="18" width="170" height="18" rx="2" fill="rgba(0,0,0,0.7)"/>
  <text x="605" y="31" text-anchor="middle" fill="#ef4444" font-size="7.5" font-family="monospace" font-weight="bold">MEDIZINSTATION</text>
</svg>
</div>

<!-- LEVEL 14: Fusionsreaktor -->
<div class="card2">
<svg viewBox="0 0 700 200" width="700" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="reactorBg" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="50%" stop-color="#0d0400"/>
      <stop offset="100%" stop-color="#050200"/>
    </radialGradient>
    <radialGradient id="plasma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#ffaa00" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <filter id="reactorGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hardGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="reactorFloor" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="#0a0400"/>
      <rect width="49" height="49" fill="none" stroke="#1a0800" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="700" height="200" fill="url(#reactorBg)"/>

  <!-- Floor -->
  <rect x="0" y="140" width="700" height="60" fill="url(#reactorFloor)"/>
  <line x1="0" y1="140" x2="700" y2="140" stroke="#2a1000" stroke-width="2"/>

  <!-- Background infrastructure -->
  <!-- Containment pipes left -->
  <rect x="10" y="40" width="18" height="100" rx="4" fill="#1a0c04" stroke="#2a1808" stroke-width="0.8"/>
  <rect x="10" y="40" width="18" height="100" fill="none" stroke="#ef4444" stroke-width="0.3" opacity="0.3"/>
  <!-- Pipe valve -->
  <rect x="6" y="80" width="26" height="12" rx="2" fill="#0f0600" stroke="#2a1000" stroke-width="0.6"/>
  <circle cx="19" cy="86" r="5" fill="none" stroke="#3a1500" stroke-width="1.2"/>

  <!-- Containment pipes right -->
  <rect x="672" y="40" width="18" height="100" rx="4" fill="#1a0c04" stroke="#2a1808" stroke-width="0.8"/>
  <rect x="672" y="80" width="26" height="12" rx="2" fill="#0f0600" stroke="#2a1000" stroke-width="0.6"/>
  <circle cx="681" cy="86" r="5" fill="none" stroke="#3a1500" stroke-width="1.2"/>

  <!-- Magnetic coil rings around reactor -->
  <ellipse cx="350" cy="95" rx="130" ry="90" fill="none" stroke="#2a1000" stroke-width="8"/>
  <ellipse cx="350" cy="95" rx="130" ry="90" fill="none" stroke="#1a0800" stroke-width="6" stroke-dasharray="8 4">
    <animateTransform attributeName="transform" type="rotate" from="0 350 95" to="360 350 95" dur="12s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Inner containment vessel -->
  <ellipse cx="350" cy="95" rx="95" ry="70" fill="#0d0500" stroke="#3a1800" stroke-width="3"/>
  <ellipse cx="350" cy="95" rx="95" ry="70" fill="none" stroke="#ef6600" stroke-width="1" opacity="0.5"/>

  <!-- Containment arms (structural) -->
  {[0, 72, 144, 216, 288].map((a,i) => null}
  <line x1="350" y1="95" x2="220" y2="70" stroke="#1a0800" stroke-width="3"/>
  <line x1="350" y1="95" x2="440" y2="35" stroke="#1a0800" stroke-width="3"/>
  <line x1="350" y1="95" x2="480" y2="130" stroke="#1a0800" stroke-width="3"/>
  <line x1="350" y1="95" x2="270" y2="155" stroke="#1a0800" stroke-width="3"/>
  <line x1="350" y1="95" x2="200" y2="125" stroke="#1a0800" stroke-width="3"/>

  <!-- Plasma core glow (ambient) -->
  <ellipse cx="350" cy="95" rx="80" ry="60" fill="url(#coreGlow)">
    <animate attributeName="rx" values="80;88;80" dur="0.7s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="60;66;60" dur="0.7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Plasma rings -->
  <ellipse cx="350" cy="95" rx="55" ry="40" fill="none" stroke="#ff6600" stroke-width="2" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 350 95" to="360 350 95" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="350" cy="95" rx="40" ry="55" fill="none" stroke="#ff4400" stroke-width="1.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 350 95" to="0 350 95" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Inner plasma core -->
  <circle cx="350" cy="95" r="28" fill="url(#plasma)" filter="url(#reactorGlow)">
    <animate attributeName="r" values="28;32;28" dur="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Core bright spot -->
  <circle cx="350" cy="95" r="10" fill="#ffffff" opacity="0.9" filter="url(#hardGlow)">
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="0.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Control station (left) -->
  <rect x="40" y="55" width="100" height="80" rx="3" fill="#0d0500" stroke="#2a1000" stroke-width="0.8"/>
  <rect x="45" y="60" width="90" height="45" rx="2" fill="#080200"/>
  <!-- Display screens on control panel -->
  <rect x="48" y="63" width="40" height="18" rx="1" fill="#0a0300"/>
  <polyline points="50,73 55,68 58,76 62,65 66,73 70,68 74,73 78,70 82,73 86,70" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  <rect x="92" y="63" width="40" height="18" rx="1" fill="#0a0300"/>
  <text x="112" y="74" text-anchor="middle" fill="#ff6600" font-size="7" font-family="monospace">TEMP</text>
  <text x="112" y="82" text-anchor="middle" fill="#ef4444" font-size="8" font-family="monospace" font-weight="bold">KRIT.</text>
  <!-- Control buttons -->
  <circle cx="60" cy="116" r="6" fill="#ef4444" opacity="0.9" filter="url(#hardGlow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="116" r="6" fill="#ff6600" opacity="0.6"/>
  <circle cx="100" cy="116" r="6" fill="#1a0800" opacity="0.5"/>
  <circle cx="120" cy="116" r="6" fill="#1a0800" opacity="0.5"/>
  <text x="70" y="130" text-anchor="middle" fill="#ef4444" font-size="5.5" font-family="monospace">⚠ NOTABSCHALTUNG</text>

  <!-- Control station (right) -->
  <rect x="560" y="55" width="100" height="80" rx="3" fill="#0d0500" stroke="#2a1000" stroke-width="0.8"/>
  <rect x="565" y="60" width="90" height="55" rx="2" fill="#080200"/>
  <!-- Pressure gauge rings -->
  <circle cx="590" cy="85" r="20" fill="none" stroke="#2a1000" stroke-width="2.5"/>
  <path d="M 572 95 A 20 20 0 0 1 608 95" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
  <line x1="590" y1="85" x2="600" y2="70" stroke="#ff6600" stroke-width="1.5" stroke-linecap="round"/>
  <text x="590" y="112" text-anchor="middle" fill="#64748b" font-size="5" font-family="monospace">P-KERN</text>
  <!-- Digital readout -->
  <rect x="618" y="65" width="30" height="40" rx="2" fill="#050200"/>
  <text x="633" y="82" text-anchor="middle" fill="#ff4400" font-size="7" font-family="monospace">9834</text>
  <text x="633" y="92" text-anchor="middle" fill="#ff4400" font-size="7" font-family="monospace">kPa</text>
  <text x="633" y="102" text-anchor="middle" fill="#ef4444" font-size="5" font-family="monospace">HOCH</text>

  <!-- Heat shimmer lines -->
  <line x1="290" y1="10" x2="285" y2="40" stroke="#ff4400" stroke-width="0.5" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0;0.15" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="350" y1="5" x2="352" y2="35" stroke="#ff6600" stroke-width="0.5" opacity="0.15">
    <animate attributeName="opacity" values="0;0.15;0" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <line x1="410" y1="10" x2="415" y2="40" stroke="#ff4400" stroke-width="0.5" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0;0.15" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- ARIA log -->
  <rect x="0" y="174" width="700" height="26" fill="rgba(0,0,0,0.8)"/>
  <rect x="0" y="174" width="700" height="1" fill="rgba(245,158,11,0.4)"/>
  <text x="12" y="185" fill="#ef4444" font-size="7" font-family="monospace" opacity="0.9">▶ ARIA-LOG:</text>
  <text x="12" y="196" fill="#94a3b8" font-size="6.5" font-family="monospace">ARIA: WARNUNG — Reaktorkern instabil. Kritischer Zustand erreicht. Temperatur 9834 kPa.</text>

  <!-- Room label -->
  <rect x="520" y="8" width="170" height="18" rx="2" fill="rgba(0,0,0,0.75)"/>
  <text x="605" y="21" text-anchor="middle" fill="#ef4444" font-size="7.5" font-family="monospace" font-weight="bold">FUSIONSREAKTOR</text>
</svg>
</div>

<!-- LEVEL 16: Rettungsdock -->
<div class="card3">
<svg viewBox="0 0 700 200" width="700" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#020d08"/>
      <stop offset="70%" stop-color="#010804"/>
      <stop offset="100%" stop-color="#010502"/>
    </radialGradient>
    <radialGradient id="dockLight" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="thrusterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
    <filter id="shipGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="700" height="200" fill="url(#spaceGrad)"/>

  <!-- Stars - far background -->
  <circle cx="45" cy="15" r="1" fill="white" opacity="0.6"/>
  <circle cx="120" cy="8" r="0.7" fill="white" opacity="0.5"/>
